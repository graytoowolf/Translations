name: Auto merge Crowdin PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  merge-crowdin-pr:
    if: >
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'l10n_main' &&
      github.event.pull_request.title == 'New Crowdin updates'
    runs-on: ubuntu-latest

    steps:
      - name: Merge Crowdin PR
        run: gh pr merge "$PR_URL" --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Trigger Build Pages
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type=build-translations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}